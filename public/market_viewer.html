<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Low-Latency Exchange Simulator</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --line: #d7dde8;
      --text: #1f2937;
      --muted: #6b7280;
      --buy: #0f766e;
      --sell: #be123c;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 20px; font-weight: 700; }
    main {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 16px;
      padding: 16px 24px 24px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
    }
    input, button {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      font: inherit;
    }
    input { padding: 0 10px; min-width: 240px; }
    button {
      padding: 0 14px;
      color: white;
      background: var(--accent);
      border-color: var(--accent);
      cursor: pointer;
    }
    .status {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
    }
    .book {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 420px;
    }
    .side + .side { border-left: 1px solid var(--line); }
    .side h2, .tape h2 {
      margin: 0;
      padding: 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--line);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      table-layout: fixed;
    }
    th, td {
      height: 32px;
      padding: 0 12px;
      border-bottom: 1px solid #edf0f5;
      text-align: right;
      font-size: 13px;
    }
    th { color: var(--muted); font-weight: 600; }
    .bid { color: var(--buy); }
    .ask { color: var(--sell); }
    .tape-list {
      height: 420px;
      overflow: auto;
      font-variant-numeric: tabular-nums;
    }
    .event {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f5;
      font-size: 13px;
    }
    @media (max-width: 780px) {
      header, main { padding-left: 12px; padding-right: 12px; }
      header, main, .book { display: block; }
      section { margin-bottom: 12px; }
      .side + .side { border-left: 0; border-top: 1px solid var(--line); }
      input { min-width: 0; width: 100%; }
      .toolbar { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Low-Latency Exchange Simulator</h1>
    <div class="status" id="status">disconnected</div>
  </header>
  <main>
    <section>
      <div class="toolbar">
        <input id="url" value="ws://127.0.0.1:9002" aria-label="WebSocket URL">
        <button id="connect">Connect</button>
      </div>
      <div class="book">
        <div class="side">
          <h2>Bids</h2>
          <table>
            <thead><tr><th>Price</th><th>Qty</th></tr></thead>
            <tbody id="bids"></tbody>
          </table>
        </div>
        <div class="side">
          <h2>Asks</h2>
          <table>
            <thead><tr><th>Price</th><th>Qty</th></tr></thead>
            <tbody id="asks"></tbody>
          </table>
        </div>
      </div>
    </section>
    <section class="tape">
      <h2>Trades</h2>
      <div class="tape-list" id="tape"></div>
    </section>
  </main>
  <script>
    const statusEl = document.querySelector("#status");
    const bidsEl = document.querySelector("#bids");
    const asksEl = document.querySelector("#asks");
    const tapeEl = document.querySelector("#tape");
    let ws = null;

    function renderLevels(target, levels, klass) {
      target.innerHTML = levels.map(level =>
        `<tr><td class="${klass}">${level.price}</td><td>${level.qty}</td></tr>`
      ).join("");
    }

    function pushTrade(trade) {
      const row = document.createElement("div");
      row.className = "event";
      row.innerHTML = `<span>#${trade.aggressor} hit #${trade.resting}</span><strong>${trade.price}</strong><span>${trade.qty}</span>`;
      tapeEl.prepend(row);
      while (tapeEl.children.length > 100) tapeEl.lastChild.remove();
    }

    document.querySelector("#connect").addEventListener("click", () => {
      if (ws) ws.close();
      ws = new WebSocket(document.querySelector("#url").value);
      statusEl.textContent = "connecting";
      ws.onopen = () => statusEl.textContent = "connected";
      ws.onclose = () => statusEl.textContent = "disconnected";
      ws.onerror = () => statusEl.textContent = "error";
      ws.onmessage = (event) => {
        const update = JSON.parse(event.data);
        const book = update.book || update;
        renderLevels(bidsEl, book.bids || [], "bid");
        renderLevels(asksEl, book.asks || [], "ask");
        (update.trades || []).forEach(pushTrade);
        statusEl.textContent = `connected · seq ${book.seq}`;
      };
    });
  </script>
</body>
</html>
